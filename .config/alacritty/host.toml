general.import = ["/var/home/jpm/.dotfiles/.config/alacritty/alacritty.toml", "/var/home/jpm/.dotfiles/.config/alacritty/softwarm.toml"]

# Invert primary colors for Host so that it stands out
[colors.primary]
foreground = '#f3f3ea'
background = '#33332a'

[colors.cursor]
text = '#33332a'
cursor = '#f3f3ea'

[colors.vi_mode_cursor]
cursor = '#33332a'
text = '#f3f3ea'

[colors.selection]
text = '#13130a'
background = '#f3f3ea'

[env]
TERM_TITLE = "Alacritty (Host)"

[font]
size = 10.0

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.bold_italic]
family = "Hack Nerd Font"
style = "SemiBold"

[font.italic]
family = "Hack Nerd Font"
style = "Light"

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[terminal.shell]
program = "/bin/bash"

[window]
title = "Alacritty - Fedora (Host)"

[window.class]
general = "Alacritty-host"
instance = "Alacritty-host"

[terminal]
