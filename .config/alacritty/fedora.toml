general.import = ["/var/home/jpm/.dotfiles/.config/alacritty/alacritty.toml", "/var/home/jpm/.dotfiles/.config/alacritty/softwarm.toml"]

[env]
TERM_TITLE = "Alacritty (Fedora)"

[font]
size = 11.0

[font.bold]
family = "Anonymice Nerd Font"
style = "Bold"

[font.bold_italic]
family = "Anonymice Nerd Font"
style = "SemiBold"

[font.italic]
family = "Anonymice Nerd Font"
style = "Light"

[font.normal]
family = "Anonymice Nerd Font"
style = "Regular"

[terminal.shell]
args = ["enter", "fedora"]
program = "/usr/bin/distrobox"

[window]
title = "Alacritty - Fedora (Distrobox)"

[window.class]
general = "Alacritty-fedora"
instance = "Alacritty-fedora"

[terminal]
