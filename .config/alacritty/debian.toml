general.import = ["/var/home/jpm/.dotfiles/.config/alacritty/alacritty.toml"]

[env]
TERM_TITLE = "Alacritty (Debian)"

[font]
size = 10.0

[font.bold]
family = "DejaVuSansMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "DejaVuSansMono Nerd Font"
style = "SemiBold"

[font.italic]
family = "DejaVuSansMono Nerd Font"
style = "Light"

[font.normal]
family = "DejaVuSansMono Nerd Font"
style = "Regular"

[terminal.shell]
args = ["enter", "debian"]
program = "/usr/bin/distrobox"

[window]
title = "Alacritty - Debian (Distrobox)"

[window.class]
general = "Alacritty-debian"
instance = "Alacritty-debian"

[terminal]
